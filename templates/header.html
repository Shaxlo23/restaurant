<nav class="navbar">

    <a href="{% url 'home' %}" class="logo">
        🍽️
        <span>FoodHub</span>
    </a>

    <ul class="nav-links">

        <li>
            <a href="{% url 'home' %}">
                Home
            </a>
        </li>

        <li>
            <a href="{% url 'restaurant_list' %}">
                Restaurants
            </a>
        </li>

        <li>
            <a href="{% url 'users_list' %}">
                Users
            </a>
        </li>

    </ul>

    <div class="auth">

        {% if user.is_authenticated %}

            <a
                href="{% url 'user_detail' user.slug %}"
                class="btn profile-btn"
            >
                👤 Profile
            </a>

            <a
                href="{% url 'logout' %}"
                class="btn logout-btn"
            >
                Logout
            </a>

        {% else %}

            <a
                href="{% url 'login' %}"
                class="btn login-btn"
            >
                Login
            </a>

            <a
                href="{% url 'user_create' %}"
                class="btn register-btn"
            >
                Register
            </a>

        {% endif %}

    </div>

</nav>

<style>

.navbar{

    position:sticky;
    top:0;
    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 32px;

    background:rgba(9,9,11,.75);

    backdrop-filter:blur(20px);

    border-bottom:
        1px solid rgba(255,255,255,.08);

    animation:slideDown .8s ease;
}

.logo{

    display:flex;
    align-items:center;
    gap:10px;

    text-decoration:none;

    font-size:1.4rem;
    font-weight:700;
}

.logo span{

    background:linear-gradient(
        90deg,
        #f97316,
        #fb7185,
        #38bdf8
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo:hover{
    transform:scale(1.05);
}

.nav-links{

    list-style:none;

    display:flex;
    align-items:center;

    gap:30px;
}

.nav-links a{

    text-decoration:none;

    color:#d4d4d8;

    font-weight:500;

    position:relative;
}

.nav-links a::after{

    content:"";

    position:absolute;

    left:0;
    bottom:-6px;

    width:0;

    height:2px;

    background:linear-gradient(
        90deg,
        #f97316,
        #38bdf8
    );

    transition:.3s;
}

.nav-links a:hover{

    color:white;
}

.nav-links a:hover::after{

    width:100%;
}

.auth{

    display:flex;
    gap:12px;
}

.btn{

    padding:10px 18px;

    border-radius:14px;

    text-decoration:none;

    font-size:14px;
    font-weight:600;

    transition:.3s;
}

.login-btn{

    color:white;

    border:1px solid rgba(255,255,255,.08);

    background:rgba(255,255,255,.04);
}

.login-btn:hover{

    transform:translateY(-3px);

    background:rgba(255,255,255,.08);
}

.register-btn{

    background:linear-gradient(
        135deg,
        #f97316,
        #fb7185
    );

    color:white;
}

.register-btn:hover{

    transform:translateY(-3px);

    box-shadow:
        0 10px 25px rgba(249,115,22,.35);
}

.profile-btn{

    color:white;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);
}

.profile-btn:hover{

    transform:translateY(-3px);
}

.logout-btn{

    color:#f87171;

    border:1px solid rgba(248,113,113,.35);

    background:rgba(248,113,113,.08);
}

.logout-btn:hover{

    transform:translateY(-3px);

    background:rgba(248,113,113,.15);
}

@keyframes slideDown{

    from{
        opacity:0;
        transform:translateY(-25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:900px){

    .navbar{

        flex-direction:column;

        gap:18px;
    }

    .nav-links{

        flex-wrap:wrap;
        justify-content:center;
    }

    .auth{

        flex-wrap:wrap;
        justify-content:center;
    }
}

</style>
