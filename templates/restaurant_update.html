{% extends 'base.html' %}

{% block content %}

<div class="page">

    <div class="card">

        <h1>✏️ Update Restaurant</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- NAME -->
            <label>Name</label>
            <input type="text" name="name" value="{{ restaurant.name }}" required>

            <!-- ADDRESS -->
            <label>Address</label>
            <input type="text" name="address" value="{{ restaurant.address }}" required>

            <!-- PHONE -->
            <label>Phone</label>
            <input type="text" name="phone" value="{{ restaurant.phone }}" required>

            <!-- CURRENT LOGO -->
            <label>Current Logo</label>

            {% if restaurant.logo %}
                <img src="{{ restaurant.logo.url }}" class="preview">
            {% else %}
                <img src="/media/logos/default.jpg" class="preview">
            {% endif %}

            <!-- NEW LOGO -->
            <label>Change Logo</label>
            <input type="file" name="logo">

            <button type="submit">💾 Save Changes</button>
        </form>

    </div>

</div>

<style>

.page{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#1a1a1a,#0f0f0f);
}

.card{
    width:450px;
    padding:30px;
    border-radius:20px;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);

    color:white;
    animation:fadeUp .5s ease;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    color:#ccc;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:8px;

    border-radius:10px;
    border:1px solid #2a2a2a;

    background:#0f0f0f;
    color:white;
}

.preview{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:12px;
    margin:10px 0;
    border:1px solid #333;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;

    border:none;
    border-radius:12px;

    background:linear-gradient(90deg,#48dbfb,#1dd1a1);
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
}

.error{
    color:#ff6b6b;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

</style>

{% endblock %}
