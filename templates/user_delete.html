{% extends 'base.html' %}

{% block content %}

<div class="page">

    <div class="card">

        <div class="icon">⚠️</div>

        <h1>Delete User</h1>

        <p class="text">
            Are you sure you want to delete
            <span>{{ user.first_name }} {{ user.last_name }}</span>?
        </p>

        <p class="warning">
            This action cannot be undone.
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="actions">

                <a href="{% url 'users_list' %}" class="cancel">
                    Cancel
                </a>

                <button type="submit" class="delete-btn">
                    Yes, Delete
                </button>

            </div>

        </form>

    </div>

</div>

<style>

/* PAGE */
.page{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CARD */
.card{
    width:100%;
    max-width:420px;

    text-align:center;

    padding:40px;

    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;

    box-shadow:0 15px 40px rgba(0,0,0,.5);

    animation:fadeUp .6s ease;
}

/* ICON */
.icon{
    font-size:50px;
    margin-bottom:10px;
}

/* TEXT */
h1{
    color:#ef4444;
    margin-bottom:10px;
}

.text{
    color:#e5e7eb;
    margin-bottom:10px;
}

.text span{
    color:white;
    font-weight:600;
}

.warning{
    color:#f87171;
    font-size:13px;
    margin-bottom:25px;
}

/* ACTIONS */
.actions{
    display:flex;
    justify-content:center;
    gap:12px;
}

/* CANCEL */
.cancel{
    padding:12px 18px;
    border-radius:12px;

    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);

    color:white;
    text-decoration:none;

    transition:.3s;
}

.cancel:hover{
    transform:translateY(-3px);
}

/* DELETE */
.delete-btn{
    padding:12px 18px;
    border-radius:12px;

    border:none;

    background:linear-gradient(135deg,#dc2626,#ef4444);
    color:white;

    cursor:pointer;

    transition:.3s;
}

.delete-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(239,68,68,.3);
}

/* ANIMATION */
@keyframes fadeUp{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

</style>

{% endblock %}
